spring:
  application:
    name: CampusMealCardSystem
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Druid连接池
    type: com.alibaba.druid.pool.DruidDataSource
    # 数据库名必须与 init.sql 中 CREATE DATABASE 的名称一致
    url: jdbc:mysql://127.0.0.1:3306/campus_card_system?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&connectionCollation=utf8mb4_unicode_ci&characterSetResults=utf-8&useSSL=false
    username: root
    # TODO: 启动前必须修改为你的 MySQL root 实际密码
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
  thymeleaf:
    cache: false

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.campus_mealcardsystem.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    lazy-loading-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 服务端口
server:
  port: 8080

# 备份文件存储目录（相对于项目根目录，默认 backup/）
app:
  backup:
    dir: backup

# 日志配置
logging:
  level:
    com.example.campus_mealcardsystem: debug
    com.baomidou.mybatisplus: debug
