<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园饭卡管理系统</title>
  <!-- 外部样式（暖色食堂风） -->
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <!-- 内联样式覆盖层级，确保食物漂浮可见 -->
  <style>
    /* 确保浮动容器在背景之上，登录卡片之下 */
    .floating-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      pointer-events: none;
      z-index: 1 !important; /* 覆盖外部样式 */
    }
    .login-wrapper {
      position: relative;
      z-index: 2 !important;
    }
    .login-card {
      position: relative;
      z-index: 10 !important;
    }
    /* 确保食物粒子动画正确 */
    .food-particle {
      position: absolute;
      left: 0;
      bottom: -50px;
      opacity: 0.7;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.12));
      animation: floatFullScreen linear infinite;
      will-change: transform, opacity;
      pointer-events: none;
      visibility: visible;
    }
    @keyframes floatFullScreen {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
      20% { opacity: 0.65; }
      80% { opacity: 0.85; }
      100% { transform: translateY(-105vh) rotate(25deg); opacity: 0; }
    }
  </style>
</head>
<body class="login-page">

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-icon">🍚</div>
      <h1>校园饭卡管理系统</h1>
      <p>Campus Meal Card · 智慧食堂</p>
    </div>

    <!-- Spring Security 表单登录 -->
    <form id="loginForm" action="/doLogin" method="POST">
      <!-- 登录失败提示 -->
      <div class="login-error-msg" id="loginErrorMsg">
        ❌ 用户名或密码错误，请重新输入
      </div>

      <div class="form-group">
        <label for="username">登录账号</label>
        <div class="input-prefix">
          <span class="prefix">👤</span>
          <input type="text" id="username" name="username" class="form-control"
                 placeholder="请输入账号（管理员/学生/教职工）" autocomplete="username" required>
        </div>
        <div class="form-error" id="usernameError"></div>
      </div>

      <div class="form-group">
        <label for="password">登录密码</label>
        <div class="input-prefix">
          <span class="prefix">🔒</span>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="请输入密码" autocomplete="current-password" required>
        </div>
        <div class="form-error" id="passwordError"></div>
      </div>

      <div class="form-group">
        <label for="captcha">验证码</label>
        <div class="captcha-row">
          <input type="text" id="captcha" class="form-control" placeholder="请输入验证码" maxlength="4"
                 style="text-transform: uppercase;" required>
          <div class="captcha-img" id="captchaCanvas" title="点击刷新验证码" onclick="refreshCaptcha()"></div>
        </div>
        <div class="form-error" id="captchaError"></div>
      </div>

      <div class="flex-between mb-16">
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="rememberMe" style="width: 16px; height: 16px;"> 记住登录状态
        </label>
        <a href="#" onclick="showToast('请联系管理员重置密码','warning'); return false;"
           style="font-size: 13px; color: #e67e22;">忘记密码?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">
        🔓 登 录 系 统
      </button>
    </form>

    <div class="text-center mt-24" style="border-top:1px solid #ffe0a3; padding-top:16px;">
      <div style="font-size:12px; color:#b96f0f; margin-bottom:8px; line-height:1.8;">
        <strong>测试账号</strong><br>
        管理员 admin / 123456<br>
        学生 zhangsan / 1234 &nbsp; 教职工 wangwu / 1234
      </div>
      <p style="font-size:12px; color:#b96f0f;">© 2026 校园一卡通中心 | 智慧后勤</p>
    </div>
  </div>
</div>

<!-- 全屏食物漂浮容器 -->
<div class="floating-container" id="floatingContainer"></div>
<div class="toast-container" id="toastContainer"></div>

<script>
  // ========== 验证码逻辑 ==========
  let currentCaptcha = '';

  function generateCaptcha() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 4; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
    return code;
  }

  function refreshCaptcha() {
    currentCaptcha = generateCaptcha();
    const el = document.getElementById('captchaCanvas');
    const colors = ['#f39c12', '#e67e22', '#d35400', '#ffaa33', '#f1c40f'];
    el.style.color = colors[Math.floor(Math.random() * colors.length)];
    el.style.transform = `rotate(${(Math.random() - 0.5) * 6}deg)`;
    el.textContent = currentCaptcha;
  }
  refreshCaptcha();

  // ========== Spring Security 登录失败参数检测 ==========
  (function() {
    const params = new URLSearchParams(window.location.search);
    if (params.has('error')) {
      const errBox = document.getElementById('loginErrorMsg');
      errBox.classList.add('show');
      if (params.get('error') === 'disabled') {
        errBox.innerHTML = '❌ 该账号已被禁用，请联系管理员';
      } else {
        errBox.innerHTML = '❌ 用户名或密码错误，请重新输入';
      }
    }
    if (params.has('logout')) {
      showToast('您已安全退出系统', 'success');
    }
  })();

  // ========== 前端表单校验 ==========
  function validateField(fieldId, errorId, rules) {
    const field = document.getElementById(fieldId);
    const error = document.getElementById(errorId);
    const value = field.value.trim();
    if (rules.required && !value) { showError(field, error, rules.requiredMsg || '此字段为必填项'); return false; }
    if (rules.minlength && value.length < rules.minlength) { showError(field, error, `长度不能少于 ${rules.minlength} 个字符`); return false; }
    clearError(field, error);
    return true;
  }
  function showError(field, error, msg) { field.classList.add('error'); error.textContent = msg; error.classList.add('show'); }
  function clearError(field, error) { field.classList.remove('error'); error.textContent = ''; error.classList.remove('show'); }

  // 表单提交前拦截：验证码校验通过后，表单正常 POST 到 Spring Security
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    const captchaInput = document.getElementById('captcha').value.trim().toUpperCase();
    let valid = true;
    valid = validateField('username', 'usernameError', { required: true, requiredMsg: '请输入登录账号', minlength: 2 }) && valid;
    valid = validateField('password', 'passwordError', { required: true, requiredMsg: '请输入登录密码', minlength: 3 }) && valid;
    valid = validateField('captcha', 'captchaError', { required: true, requiredMsg: '请输入验证码' }) && valid;
    if (!valid) { e.preventDefault(); return; }
    if (captchaInput !== currentCaptcha) {
      e.preventDefault();
      const captchaEl = document.getElementById('captcha');
      const errEl = document.getElementById('captchaError');
      showError(captchaEl, errEl, '验证码错误，请重新输入');
      refreshCaptcha();
      document.getElementById('captcha').value = '';
      document.getElementById('captcha').focus();
      return;
    }
    // 校验通过，表单正常提交
  });

  // 输入框失焦实时校验
  document.getElementById('username').addEventListener('blur', function () {
    validateField('username', 'usernameError', { required: true, requiredMsg: '请输入登录账号', minlength: 2 });
  });
  document.getElementById('password').addEventListener('blur', function () {
    validateField('password', 'passwordError', { required: true, requiredMsg: '请输入登录密码', minlength: 3 });
  });

  // ========== Toast 提示 ==========
  function showToast(message, type) {
    type = type || 'info';
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast ' + type;
    const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
    toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(60px)';
      toast.style.transition = 'all 0.3s ease';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }

  // ========== 全屏食物漂浮效果（优化版） ==========
  // 加权随机：主食类概率更高，甜点水果类较低
  const FOOD_WEIGHTED = [
    {e:'🍚', w:3}, {e:'🍛', w:3}, {e:'🍜', w:3}, {e:'🍲', w:2}, {e:'🥟', w:2},
    {e:'🍗', w:2}, {e:'🥗', w:2}, {e:'🍙', w:2}, {e:'🍘', w:1}, {e:'🍥', w:1},
    {e:'🥛', w:2}, {e:'🍕', w:1}, {e:'🥨', w:1},
    {e:'🍎', w:1}, {e:'🍉', w:1}, {e:'🍒', w:1}, {e:'🥝', w:1}, {e:'🥑', w:1},
    {e:'🍰', w:1}, {e:'🍦', w:1}, {e:'🍪', w:1}, {e:'🍡', w:1},
  ];
  const _foodPool = FOOD_WEIGHTED.flatMap(f => Array(f.w).fill(f.e));
  function pickFood() { return _foodPool[Math.floor(Math.random() * _foodPool.length)]; }

  function createParticle() {
    const particle = document.createElement('div');
    particle.className = 'food-particle';
    particle.textContent = pickFood();
    particle.style.left = Math.random() * 100 + '%';
    particle.style.bottom = Math.random() * 30 + 'px';  // 0~30px，无负值
    // 景深分层：大粒子（近景）快且亮，小粒子（远景）慢且暗
    const depth = Math.random();              // 0=远 1=近
    const size = 20 + depth * 32;             // 20~52px
    const maxOpacity = 0.4 + depth * 0.45;     // 0.4~0.85
    const duration = 6 + (1 - depth) * 8;      // 近景6~8s，远景10~14s
    const rotation = (Math.random() - 0.5) * 720;  // -360~360deg
    particle.style.fontSize = size + 'px';
    particle.style.setProperty('--max-opacity', maxOpacity.toFixed(2));
    particle.style.setProperty('--rot', rotation + 'deg');
    particle.style.animationDuration = duration + 's';
    particle.style.animationDelay = Math.random() * 8 + 's';
    return particle;
  }

  let _particleTarget = 0;
  function generateFullscreenFoods() {
    const container = document.getElementById('floatingContainer');
    if (!container) return;
    container.innerHTML = '';
    _particleTarget = Math.min(55, Math.max(30, Math.floor(window.innerWidth / 30)));
    for (let i = 0; i < _particleTarget; i++) {
      container.appendChild(createParticle());
    }
  }

  // 逐个替换：移除少量旧粒子 + 添加新粒子，避免全量重建闪烁
  function refreshSomeParticles() {
    const container = document.getElementById('floatingContainer');
    if (!container) return;
    const existing = container.querySelectorAll('.food-particle');
    if (existing.length === 0) return;
    // 随机移除 3~5 个旧粒子
    const removeCount = 3 + Math.floor(Math.random() * 3);
    const indices = new Set();
    while (indices.size < Math.min(removeCount, existing.length)) {
      indices.add(Math.floor(Math.random() * existing.length));
    }
    [...indices].forEach(i => existing[i].remove());
    // 补充等量新粒子
    for (let i = 0; i < removeCount; i++) {
      container.appendChild(createParticle());
    }
  }

  window.addEventListener('load', () => {
    generateFullscreenFoods();
    setInterval(refreshSomeParticles, 2500);  // 每 2.5s 微量替换，无闪烁
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(generateFullscreenFoods, 300);
  });
</script>
</body>
</html>
