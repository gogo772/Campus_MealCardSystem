<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园饭卡管理系统</title>
  <style>
    /* ========================================
       全局变量 & 基础样式（暖色食堂风）
    ======================================== */
    :root {
      --primary: #f39c12;
      --primary-hover: #e67e22;
      --primary-active: #d35400;
      --primary-light: #fff3e0;
      --success: #52c41a;
      --warning: #faad14;
      --danger: #ff4d4f;
      --text-primary: #2c3e2f;
      --text-secondary: #5a6b5a;
      --text-hint: #8c8c8c;
      --border: #ffe0a3;
      --border-light: #fff0d0;
      --bg-body: #fff9ef;
      --bg-white: #fffef7;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 8px 20px rgba(0,0,0,0.12);
      --shadow-lg: 0 20px 35px rgba(0,0,0,0.2);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 32px;
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100%;
      font-family: var(--font-family);
      font-size: 14px;
      color: var(--text-primary);
      background: radial-gradient(circle at 20% 30%, #ffb347, #ff8c00);
      background-attachment: fixed;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* 登录主布局 - 居中卡片 */
    .login-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    /* 暖色食堂风卡片 */
    .login-card {
      background: var(--bg-white);
      border-radius: 48px 24px 48px 24px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.2), 0 0 0 8px rgba(255,200,100,0.3);
      width: 440px;
      max-width: 100%;
      padding: 38px 32px;
      transition: all 0.3s ease;
      border: 1px solid #ffd966;
      position: relative;
      z-index: 10;
      overflow: hidden;
    }

    .login-card:hover {
      border-radius: 24px 48px 24px 48px;
      box-shadow: 0 30px 55px rgba(0,0,0,0.25);
      transform: translateY(-5px);
    }

    /* 卡片光泽扫过效果 */
    .login-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.2), transparent);
      transition: 0.6s;
      pointer-events: none;
    }

    .login-card:hover::after {
      left: 100%;
    }

    /* 头部 */
    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 70px;
      height: 70px;
      background: #ffaa33;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      font-size: 36px;
      color: white;
      box-shadow: 0 8px 20px rgba(255,140,0,0.4);
    }

    .login-header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #5a3e1b;
      margin-bottom: 6px;
    }

    .login-header p {
      font-size: 13px;
      color: #b96f0f;
    }

    /* 表单组件 */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .form-control {
      width: 100%;
      height: 44px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text-primary);
      background: white;
      transition: var(--transition);
      outline: none;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(243,156,18,0.2);
    }

    .form-control.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 2px rgba(255,77,79,0.15);
    }

    .input-prefix {
      position: relative;
    }

    .input-prefix .prefix {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text-hint);
    }

    .input-prefix .form-control {
      padding-left: 42px;
    }

    .form-error {
      font-size: 12px;
      color: var(--danger);
      margin-top: 4px;
      display: none;
    }

    .form-error.show {
      display: block;
    }

    /* 验证码区域 */
    .captcha-row {
      display: flex;
      gap: 12px;
    }

    .captcha-row .form-control {
      flex: 1;
    }

    .captcha-img {
      width: 110px;
      height: 44px;
      background: #f5f0e0;
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 4px;
      font-family: monospace;
      transition: 0.2s;
    }

    /* 按钮系统 */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 46px;
      padding: 0 24px;
      border: none;
      border-radius: 40px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-primary {
      background: linear-gradient(90deg, #f39c12, #e67e22);
      color: white;
      letter-spacing: 1px;
    }

    .btn-primary:hover {
      background: linear-gradient(90deg, #e67e22, #d35400);
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(230,126,34,0.5);
    }

    .btn-block {
      width: 100%;
    }

    .btn-lg {
      height: 48px;
      font-size: 16px;
    }

    /* 辅助工具 */
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .text-center {
      text-align: center;
    }

    .text-danger {
      color: var(--danger);
    }

    .mt-16 {
      margin-top: 16px;
    }

    .mt-24 {
      margin-top: 24px;
    }

    .mb-16 {
      margin-bottom: 16px;
    }

    /* Toast 容器 */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: white;
      border-radius: 12px;
      padding: 10px 18px;
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideInRight 0.3s ease;
      border-left: 4px solid;
    }

    .toast.success { border-left-color: #52c41a; }
    .toast.error { border-left-color: #ff4d4f; }
    .toast.warning { border-left-color: #faad14; }
    .toast.info { border-left-color: #1890ff; }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(60px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* 加载动画 */
    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ========== 全屏食物漂浮容器 ========== */
    .floating-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;          /* 覆盖整个屏幕 */
      overflow: hidden;
      pointer-events: none;   /* 鼠标穿透，不干扰操作 */
      z-index: 1;
    }

    /* 食物粒子 */
    .food-particle {
      position: absolute;
      left: 0;
      bottom: -40px;          /* 从底部稍下方开始 */
      opacity: 0.65;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.15));
      animation: floatFullScreen linear infinite;
      will-change: transform;
      pointer-events: none;
    }

    /* 全屏漂浮动画：从底部移动到顶部完全离开屏幕 */
    @keyframes floatFullScreen {
      0% {
        transform: translateY(0);
        opacity: 0.5;
      }
      80% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(-100vh);   /* 向上移动整个视口高度 */
        opacity: 0;
      }
    }

    /* 响应式适配 */
    @media (max-width: 550px) {
      .login-card {
        padding: 28px 20px;
      }
      .logo-icon {
        width: 55px;
        height: 55px;
        font-size: 28px;
      }
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-icon">🍚</div>
      <h1>校园饭卡管理系统</h1>
      <p>Campus Meal Card · 智慧食堂</p>
    </div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label for="username">管理员账号</label>
        <div class="input-prefix">
          <span class="prefix">👤</span>
          <input type="text" id="username" class="form-control" placeholder="请输入管理员账号" autocomplete="username" required>
        </div>
        <div class="form-error" id="usernameError"></div>
      </div>

      <div class="form-group">
        <label for="password">登录密码</label>
        <div class="input-prefix">
          <span class="prefix">🔒</span>
          <input type="password" id="password" class="form-control" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
        <div class="form-error" id="passwordError"></div>
      </div>

      <div class="form-group">
        <label for="captcha">验证码</label>
        <div class="captcha-row">
          <input type="text" id="captcha" class="form-control" placeholder="请输入验证码" maxlength="4" style="text-transform: uppercase;" required>
          <div class="captcha-img" id="captchaCanvas" title="点击刷新验证码" onclick="refreshCaptcha()"></div>
        </div>
        <div class="form-error" id="captchaError"></div>
      </div>

      <div class="flex-between mb-16">
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="rememberMe" style="width: 16px; height: 16px;"> 记住登录状态
        </label>
        <a href="#" onclick="showToast('请联系超级管理员重置密码','warning'); return false;" style="font-size: 13px; color: #e67e22;">忘记密码?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">
        🔓 登 录 系 统
      </button>
      <div id="globalError" class="text-danger text-center mt-16" style="display:none; font-size:13px;"></div>
    </form>

    <div class="text-center mt-24" style="border-top:1px solid #ffe0a3; padding-top:16px;">
      <p style="font-size:12px; color:#b96f0f;">© 2026 校园一卡通中心 | 智慧后勤</p>
    </div>
  </div>
</div>

<!-- 全屏食物漂浮容器 -->
<div class="floating-container" id="floatingContainer"></div>

<div class="toast-container" id="toastContainer"></div>

<script>
  // ========== 验证码逻辑 ==========
  let currentCaptcha = '';

  function generateCaptcha() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 4; i++) {
      code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return code;
  }

  function refreshCaptcha() {
    currentCaptcha = generateCaptcha();
    const el = document.getElementById('captchaCanvas');
    const colors = ['#f39c12', '#e67e22', '#d35400', '#ffaa33', '#f1c40f'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    el.style.color = color;
    const rotate = (Math.random() - 0.5) * 6;
    el.style.transform = `rotate(${rotate}deg)`;
    el.textContent = currentCaptcha;
  }

  refreshCaptcha();

  // ========== 表单校验 ==========
  function validateField(fieldId, errorId, rules) {
    const field = document.getElementById(fieldId);
    const error = document.getElementById(errorId);
    const value = field.value.trim();

    if (rules.required && !value) {
      showError(field, error, rules.requiredMsg || '此字段为必填项');
      return false;
    }
    if (rules.minlength && value.length < rules.minlength) {
      showError(field, error, `长度不能少于 ${rules.minlength} 个字符`);
      return false;
    }
    clearError(field, error);
    return true;
  }

  function showError(field, error, msg) {
    field.classList.add('error');
    error.textContent = msg;
    error.classList.add('show');
  }

  function clearError(field, error) {
    field.classList.remove('error');
    error.textContent = '';
    error.classList.remove('show');
  }

  function clearAllErrors() {
    document.querySelectorAll('.form-control').forEach(el => el.classList.remove('error'));
    document.querySelectorAll('.form-error').forEach(el => { el.textContent = ''; el.classList.remove('show'); });
    const ge = document.getElementById('globalError');
    if (ge) { ge.style.display = 'none'; ge.textContent = ''; }
  }

  document.getElementById('username').addEventListener('blur', function () {
    validateField('username', 'usernameError', { required: true, requiredMsg: '请输入管理员账号', minlength: 2 });
  });
  document.getElementById('password').addEventListener('blur', function () {
    validateField('password', 'passwordError', { required: true, requiredMsg: '请输入登录密码', minlength: 3 });
  });
  document.getElementById('captcha').addEventListener('blur', function () {
    validateField('captcha', 'captchaError', { required: true, requiredMsg: '请输入验证码' });
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') handleLogin(e);
  });

  // ========== 登录处理 ==========
  async function handleLogin(e) {
    if (e) e.preventDefault();
    clearAllErrors();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const captchaInput = document.getElementById('captcha').value.trim().toUpperCase();

    let valid = true;
    valid = validateField('username', 'usernameError', { required: true, requiredMsg: '请输入管理员账号', minlength: 2 }) && valid;
    valid = validateField('password', 'passwordError', { required: true, requiredMsg: '请输入登录密码', minlength: 3 }) && valid;
    valid = validateField('captcha', 'captchaError', { required: true, requiredMsg: '请输入验证码' }) && valid;

    if (!valid) return false;

    if (captchaInput !== currentCaptcha) {
      const captchaEl = document.getElementById('captcha');
      const errEl = document.getElementById('captchaError');
      showError(captchaEl, errEl, '验证码错误，请重新输入');
      refreshCaptcha();
      document.getElementById('captcha').value = '';
      document.getElementById('captcha').focus();
      return false;
    }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span> 登录中...';

    try {
      await new Promise(resolve => setTimeout(resolve, 1200));
      if (username && password) {
        showToast('登录成功，正在跳转...', 'success');
        setTimeout(() => {
          window.location.href = '/index';
        }, 800);
      } else {
        throw new Error('用户名或密码不能为空');
      }
    } catch (err) {
      showToast(err.message || '登录失败，请重试', 'error');
      refreshCaptcha();
      document.getElementById('captcha').value = '';
      btn.disabled = false;
      btn.innerHTML = '🔓 登 录 系 统';
    }
    return false;
  }

  // ========== Toast 提示 ==========
  function showToast(message, type) {
    type = type || 'info';
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast ' + type;
    const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
    toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(60px)';
      toast.style.transition = 'all 0.3s ease';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }

  // ========== 全屏食物漂浮效果 ==========
  function generateFullscreenFoods() {
    const container = document.getElementById('floatingContainer');
    if (!container) return;
    container.innerHTML = '';
    const foods = ['🍚', '🍛', '🍜', '🍲', '🥟', '🍗', '🥗', '🍎', '🥛', '🍰', '🍉', '🍒', '🍕', '🥨', '🍙', '🍘', '🍥', '🍡', '🍦', '🍪', '🥝', '🥑'];
    // 生成数量：根据屏幕宽度动态调整，避免过密或过疏（基准 50 个）
    const particleCount = Math.min(70, Math.max(45, Math.floor(window.innerWidth / 25)));
    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.className = 'food-particle';
      particle.innerHTML = foods[Math.floor(Math.random() * foods.length)];
      // 水平位置完全随机 0% ~ 100%
      particle.style.left = Math.random() * 100 + '%';
      // 起始垂直位置：从底部稍下方开始（-20px ~ 20px），部分可稍微露出
      particle.style.bottom = (Math.random() * 60 - 20) + 'px';
      // 随机大小 24px ~ 52px
      const size = 24 + Math.random() * 28;
      particle.style.fontSize = size + 'px';
      // 动画时长 4s ~ 14s，有快有慢
      particle.style.animationDuration = 4 + Math.random() * 10 + 's';
      // 动画延迟 0s ~ 10s，实现错落起伏
      particle.style.animationDelay = Math.random() * 10 + 's';
      container.appendChild(particle);
    }
  }

  // 页面加载时生成一次，之后每隔 18 秒重新生成，保持动态活力
  window.addEventListener('load', () => {
    generateFullscreenFoods();
    setInterval(() => {
      generateFullscreenFoods();
    }, 18000);
  });

  // 当窗口大小改变时，重新调整粒子数量（但不强制全部刷新，可选优化）
  let resizeTimer;
  window.addEventListener('resize', () => {
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      generateFullscreenFoods();
    }, 300);
  });
</script>
</body>
</html>
